<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UOMI | Contact</title>
    <meta
      name="description"
      content="Contact UOMI for custom ceramic work and orders."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="contact-page">
    <script src="figures.js"></script>
    <div class="page-bg page-bg-contact" aria-hidden="true">
      <!-- Inline figure (same geometry as #f-stand) so the right arm can keyframe -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -10 100 145" preserveAspectRatio="xMidYMid meet">
        <ellipse cx="0" cy="10" rx="5" ry="10" fill="currentColor" />
        <path
          fill="currentColor"
          d="M0 25 C6 25, 10 35, 11 50 C13 68, 14 85, 0 85 C-14 85, -13 68, -11 50 C-10 35, -6 25, 0 25 Z"
        />
        <g
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="-14,32 -16,42 -19,62 -20,67" />
          <polyline
            id="contactWaveRightArm"
            points="14,32 16,42 19,62 20,67"
          />
          <polyline points="6,90 6,105 6,130" />
          <polyline points="-6,90 -6,105 -6,130" />
        </g>
      </svg>
    </div>

    <header class="topbar">
      <div class="container nav">
        <a href="index.html" class="brand">UOMI</a>
        <nav>
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
        <button class="cart-btn" id="cartButton" aria-label="Open cart">
          <span class="cart-icon" aria-hidden="true">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
          </span>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </header>

    <main>
      <section class="contact-card">
        <h2>Contact &amp; Custom Orders</h2>
        <p>
          Reach out on Instagram
          <a href="https://www.instagram.com/uomi.art" target="_blank" rel="noopener">@uomi.art</a>.
        </p>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>&copy; <span id="year"></span> UOMI. All rights reserved.</p>
      </div>
    </footer>

    <!-- Cart overlay + drawer -->
    <div class="cart-overlay" id="cartOverlay" role="presentation"></div>
    <aside class="cart-drawer" id="cartDrawer" role="dialog" aria-label="Your selection" aria-modal="true">
      <div class="cart-drawer-header">
        <h3>Your Selection</h3>
        <button class="cart-drawer-close" id="cartClose" aria-label="Close cart">&#x2715;</button>
      </div>
      <div class="cart-body" id="cartBody">
        <p class="cart-empty-msg">Your selection is empty.<br>Add a piece to get started.</p>
      </div>
      <div class="cart-drawer-footer" id="cartFooter" hidden>
        <p class="cart-stripe-note">Each piece is purchased separately via a secure Stripe payment page.</p>
      </div>
    </aside>

    <script src="script.js"></script>
  </body>
</html>
