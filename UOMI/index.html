<!doctype html>
<html lang="en">
  <head>

    <title>UOMI | Home</title>
    <meta
      name="description"
      content="UOMI ceramic art: handcrafted ceramic pieces for contemporary spaces."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="home-page">
    <div class="page-bg page-bg-home" aria-hidden="true">
      <div class="home-fig home-fig--1" data-home-anim="leg-sway"></div>
      <div class="home-fig home-fig--2" data-home-anim="egyptian-dance"></div>
      <div class="home-fig home-fig--3" data-home-anim="ballet" aria-hidden="true"></div>
      <div class="home-fig home-fig--4" data-home-anim="figure-4" aria-hidden="true"></div>
    </div>

    <header class="topbar">
      <div class="container nav">
        <a href="index.html" class="brand">UOMI</a>
        <nav>
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container hero-content">
          <p class="kicker">UOMI Ceramic Art</p>
          <h1 class="hero-title">
            Clay that moves,<br />

          </h1>
          <p class="hero-lead">
            Handcrafted ceramics to wear, display, and live with.<br />
            Each one unrepeatable and unique.
          </p>
          <a class="cta" href="shop.html">View collection</a>
        </div>
      </section>

      <section class="container section section-welcome">
        <div
          class="home-fig home-fig--5"
          data-home-anim="fall-o"
          aria-hidden="true"
        ></div>
        <div class="section-title-row">
          <h2>Welcome to U<span class="welcome-uomi-o">O</span>MI</h2>
          <p>Browse Home, Shop, About and Contact.</p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>&copy; <span id="year"></span> UOMI. All rights reserved.</p>
      </div>
